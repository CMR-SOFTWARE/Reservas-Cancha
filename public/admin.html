<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Panel Administrador</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="min-h-screen bg-slate-100 text-slate-800">
    <main class="mx-auto max-w-5xl p-4 md:p-6">
      <header class="mb-4">
        <h1 class="text-2xl font-bold md:text-3xl">Panel Administrador</h1>
        <p class="text-slate-600">Gestion de reservas, bloqueos y cancelaciones.</p>
      </header>

      <section id="loginCard" class="mb-4 rounded-xl bg-white p-4 shadow-sm">
        <h2 class="mb-3 text-xl font-semibold">Acceso admin</h2>
        <div class="mb-3 flex flex-col gap-1">
          <label class="font-medium" for="adminPassword">Clave de administrador</label>
          <input id="adminPassword" type="password" class="rounded-lg border border-slate-300 px-3 py-2" />
        </div>
        <button id="btnLogin" class="rounded-lg bg-emerald-700 px-4 py-2 font-semibold text-white hover:bg-emerald-800" type="button">Ingresar</button>
        <p id="loginMessage" class="mt-2 min-h-5 text-sm font-semibold text-red-700"></p>
      </section>

      <section id="adminPanel" class="hidden">
        <section class="mb-4 rounded-xl bg-white p-4 shadow-sm">
          <div class="mb-3 flex flex-wrap items-center justify-between gap-2">
            <h2 class="text-xl font-semibold">Bloquear cancha</h2>
            <div class="flex flex-wrap items-center gap-2">
              <a
                id="linkMenu"
                href="#"
                class="rounded-lg bg-slate-500 px-4 py-2 font-semibold text-white hover:bg-slate-600"
              >
                Volver al menu principal
              </a>
              <button id="btnLogout" class="rounded-lg bg-slate-600 px-4 py-2 font-semibold text-white hover:bg-slate-700" type="button">Cerrar sesion</button>
            </div>
          </div>
          <div class="mb-3 grid grid-cols-1 gap-3 md:grid-cols-2 lg:grid-cols-4">
            <div class="flex flex-col gap-1">
              <label class="font-medium" for="bloqCancha">Cancha</label>
              <select id="bloqCancha" class="rounded-lg border border-slate-300 px-3 py-2"></select>
            </div>
            <div class="flex flex-col gap-1">
              <label class="font-medium" for="bloqFecha">Fecha</label>
              <input id="bloqFecha" type="date" class="rounded-lg border border-slate-300 px-3 py-2" />
            </div>
            <div class="flex flex-col gap-1">
              <label class="font-medium" for="bloqHorarioDesde">Horario desde</label>
              <select id="bloqHorarioDesde" class="rounded-lg border border-slate-300 px-3 py-2"></select>
            </div>
            <div class="flex flex-col gap-1">
              <label class="font-medium" for="bloqHorarioHasta">Horario hasta</label>
              <select id="bloqHorarioHasta" class="rounded-lg border border-slate-300 px-3 py-2"></select>
            </div>
          </div>
          <div class="mb-3 flex items-center gap-2">
            <input id="bloqDiaCompleto" type="checkbox" class="h-4 w-4" />
            <label for="bloqDiaCompleto" class="font-medium">Dia completo</label>
          </div>
          <div class="mb-3 flex flex-col gap-1">
            <label class="font-medium" for="bloqMotivo">Motivo</label>
            <input id="bloqMotivo" type="text" placeholder="Ej: lluvia intensa" class="rounded-lg border border-slate-300 px-3 py-2" />
          </div>
          <button id="btnCrearBloqueo" class="rounded-lg bg-emerald-700 px-4 py-2 font-semibold text-white hover:bg-emerald-800" type="button">Crear bloqueo</button>
          <p id="adminMessage" class="mt-2 min-h-5 text-sm font-semibold text-red-700"></p>
        </section>

        <section class="mb-4 rounded-xl bg-white p-4 shadow-sm">
          <h2 class="mb-3 text-xl font-semibold">Bloqueos activos</h2>
          <div id="bloqueosList" class="grid gap-3"></div>
        </section>

        <section class="mb-4 rounded-xl bg-white p-4 shadow-sm">
          <div class="mb-3 flex flex-wrap items-center justify-between gap-3">
            <h2 class="text-xl font-semibold">Turnos reservados</h2>
            <div class="flex items-center gap-2">
              <label class="text-sm font-medium text-slate-600" for="filtroFecha">Fecha</label>
              <input id="filtroFecha" type="date" class="rounded-lg border border-slate-300 px-3 py-1.5 text-sm" />
              <button id="btnFiltrarReservas" class="rounded-lg bg-slate-700 px-3 py-1.5 text-sm font-semibold text-white hover:bg-slate-800" type="button">Filtrar</button>
              <button id="btnLimpiarFiltro" class="rounded-lg border border-slate-300 px-3 py-1.5 text-sm font-semibold text-slate-600 hover:bg-slate-100" type="button">Todas</button>
            </div>
          </div>
          <div id="reservasList" class="grid gap-3"></div>
        </section>

        <section class="mb-4 rounded-xl bg-white p-4 shadow-sm">
          <button id="btnToggleConfig" class="flex w-full items-center justify-between text-left" type="button">
            <h2 class="text-xl font-semibold">Configuracion del club</h2>
            <span id="configChevron" class="text-slate-400 transition-transform">&#9660;</span>
          </button>

          <div id="configPanel" class="hidden mt-4 space-y-6">

            <!-- Info general -->
            <div>
              <h3 class="mb-3 font-semibold text-slate-600">Datos generales</h3>
              <div class="grid grid-cols-1 gap-3 md:grid-cols-2">
                <div class="flex flex-col gap-1">
                  <label class="text-sm font-medium" for="cfgNombre">Nombre del club</label>
                  <input id="cfgNombre" type="text" class="rounded-lg border border-slate-300 px-3 py-2" />
                </div>
                <div class="flex flex-col gap-1">
                  <label class="text-sm font-medium" for="cfgWhatsapp">WhatsApp (solo numeros)</label>
                  <input id="cfgWhatsapp" type="text" placeholder="5491112345678" class="rounded-lg border border-slate-300 px-3 py-2" />
                </div>
                <div class="flex flex-col gap-1">
                  <label class="text-sm font-medium" for="cfgHoraInicio">Hora apertura</label>
                  <input id="cfgHoraInicio" type="number" min="0" max="22" class="rounded-lg border border-slate-300 px-3 py-2" />
                </div>
                <div class="flex flex-col gap-1">
                  <label class="text-sm font-medium" for="cfgHoraFin">Hora cierre</label>
                  <input id="cfgHoraFin" type="number" min="1" max="23" class="rounded-lg border border-slate-300 px-3 py-2" />
                </div>
                <div class="flex flex-col gap-1">
                  <label class="text-sm font-medium" for="cfgPrecio">Precio de la seña</label>
                  <input id="cfgPrecio" type="text" placeholder="12000" class="rounded-lg border border-slate-300 px-3 py-2" />
                </div>
              </div>
            </div>

            <!-- Transferencia -->
            <div>
              <h3 class="mb-3 font-semibold text-slate-600">Datos de transferencia</h3>
              <div class="grid grid-cols-1 gap-3 md:grid-cols-3">
                <div class="flex flex-col gap-1">
                  <label class="text-sm font-medium" for="cfgAlias">Alias</label>
                  <input id="cfgAlias" type="text" class="rounded-lg border border-slate-300 px-3 py-2" />
                </div>
                <div class="flex flex-col gap-1">
                  <label class="text-sm font-medium" for="cfgCbu">CBU</label>
                  <input id="cfgCbu" type="text" class="rounded-lg border border-slate-300 px-3 py-2" />
                </div>
                <div class="flex flex-col gap-1">
                  <label class="text-sm font-medium" for="cfgTitular">Titular</label>
                  <input id="cfgTitular" type="text" class="rounded-lg border border-slate-300 px-3 py-2" />
                </div>
              </div>
              <button id="btnGuardarClub" class="mt-3 rounded-lg bg-emerald-700 px-4 py-2 font-semibold text-white hover:bg-emerald-800" type="button">Guardar cambios</button>
              <p id="cfgClubMsg" class="mt-2 min-h-5 text-sm font-semibold"></p>
            </div>

            <!-- Canchas -->
            <div>
              <h3 class="mb-3 font-semibold text-slate-600">Canchas</h3>
              <div id="canchasList" class="mb-3 space-y-2"></div>
              <div class="flex flex-wrap gap-2">
                <input id="nuevaCanchaNombre" type="text" placeholder="Nombre (ej: 11)" class="rounded-lg border border-slate-300 px-3 py-2 w-32" />
                <input id="nuevaCanchaEtiqueta" type="text" placeholder="Etiqueta (ej: Cancha 11)" class="rounded-lg border border-slate-300 px-3 py-2 flex-1" />
                <button id="btnAgregarCancha" class="rounded-lg bg-blue-700 px-4 py-2 font-semibold text-white hover:bg-blue-800" type="button">Agregar</button>
              </div>
              <p id="cfgCanchaMsg" class="mt-2 min-h-5 text-sm font-semibold"></p>
            </div>

            <!-- Cambiar clave -->
            <div>
              <h3 class="mb-3 font-semibold text-slate-600">Cambiar contrasena</h3>
              <div class="grid grid-cols-1 gap-3 md:grid-cols-2">
                <div class="flex flex-col gap-1">
                  <label class="text-sm font-medium" for="cfgPassActual">Contrasena actual</label>
                  <input id="cfgPassActual" type="password" class="rounded-lg border border-slate-300 px-3 py-2" />
                </div>
                <div class="flex flex-col gap-1">
                  <label class="text-sm font-medium" for="cfgPassNuevo">Nueva contrasena</label>
                  <input id="cfgPassNuevo" type="password" class="rounded-lg border border-slate-300 px-3 py-2" />
                </div>
              </div>
              <button id="btnCambiarPass" class="mt-3 rounded-lg bg-slate-700 px-4 py-2 font-semibold text-white hover:bg-slate-800" type="button">Cambiar contrasena</button>
              <p id="cfgPassMsg" class="mt-2 min-h-5 text-sm font-semibold"></p>
            </div>

          </div>
        </section>
      </section>
    </main>

    <script src="/admin.js"></script>
  </body>
</html>
