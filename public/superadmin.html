<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Super Admin — Turnos Club</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-gradient-to-br from-slate-100 to-slate-200">

  <header class="bg-white border-b border-slate-200 shadow-sm px-6 py-4">
    <div class="mx-auto max-w-2xl flex items-center gap-3">
      <svg width="36" height="36" viewBox="0 0 44 44" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect width="44" height="44" rx="10" fill="#15803d"/>
        <rect x="7" y="13" width="30" height="20" rx="2" stroke="white" stroke-width="2" fill="none"/>
        <line x1="22" y1="13" x2="22" y2="33" stroke="white" stroke-width="2"/>
        <circle cx="22" cy="23" r="4.5" stroke="white" stroke-width="2" fill="none"/>
        <rect x="7" y="18" width="4" height="10" rx="1" stroke="white" stroke-width="1.5" fill="none"/>
        <rect x="33" y="18" width="4" height="10" rx="1" stroke="white" stroke-width="1.5" fill="none"/>
      </svg>
      <div>
        <h1 class="text-lg font-bold text-slate-800 leading-tight">Super Admin</h1>
        <p class="text-xs text-slate-500 leading-tight">Turnos Club</p>
      </div>
      <a href="/" class="ml-auto text-xs text-slate-400 hover:text-slate-600">← Inicio</a>
    </div>
  </header>

  <main class="mx-auto max-w-2xl px-4 py-10 space-y-6">

    <!-- Login -->
    <section id="loginCard" class="bg-white rounded-xl border border-slate-200 shadow-sm p-6 space-y-4">
      <h2 class="text-lg font-semibold text-slate-700">Acceso super-admin</h2>
      <div class="flex gap-2">
        <input id="saPassword" type="password" placeholder="Clave maestra"
               class="flex-1 rounded-lg border border-slate-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-green-500" />
        <button id="btnSaLogin"
                class="rounded-lg bg-green-700 px-4 py-2 text-sm font-semibold text-white hover:bg-green-800">
          Ingresar
        </button>
      </div>
      <p id="loginMsg" class="text-sm text-red-600 hidden"></p>
    </section>

    <!-- Panel (oculto hasta login) -->
    <div id="saPanel" class="hidden space-y-6">

      <!-- Clubs existentes -->
      <section class="bg-white rounded-xl border border-slate-200 shadow-sm p-6 space-y-4">
        <div class="flex items-center justify-between">
          <h2 class="text-lg font-semibold text-slate-700">Clubs registrados</h2>
          <button id="btnRefreshClubs" class="text-xs text-green-700 hover:underline font-semibold">
            Actualizar
          </button>
        </div>
        <div id="clubsList" class="space-y-3 text-sm text-slate-500">Cargando...</div>
        <p id="logoMsg" class="text-sm hidden"></p>
      </section>

      <!-- Crear club nuevo -->
      <section class="bg-white rounded-xl border border-slate-200 shadow-sm p-6 space-y-4">
        <h2 class="text-lg font-semibold text-slate-700">Agregar club nuevo</h2>

        <div class="space-y-3">
          <div>
            <label class="block text-xs font-semibold text-slate-500 mb-1">Nombre del club</label>
            <input id="cfgNombre" type="text" placeholder="Ej: Club CMR Fútbol"
                   class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-green-500" />
          </div>
          <div>
            <label class="block text-xs font-semibold text-slate-500 mb-1">
              Slug <span class="font-normal text-slate-400">(URL del club: /slug)</span>
            </label>
            <input id="cfgSlug" type="text" placeholder="Ej: cmr-futbol"
                   class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm font-mono focus:outline-none focus:ring-2 focus:ring-green-500" />
          </div>
          <div>
            <label class="block text-xs font-semibold text-slate-500 mb-1">Clave admin del club</label>
            <input id="cfgPassword" type="text" placeholder="Clave que usará el admin del club"
                   class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-green-500" />
          </div>
        </div>

        <button id="btnCrearClub"
                class="rounded-lg bg-green-700 px-4 py-2 text-sm font-semibold text-white hover:bg-green-800">
          Crear club
        </button>
        <p id="createMsg" class="text-sm hidden"></p>
      </section>

    </div>
  </main>

  <script src="/superadmin.js"></script>
</body>
</html>
