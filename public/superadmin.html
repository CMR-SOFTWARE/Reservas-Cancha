<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Super Admin — Turnos Club</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-slate-100">

  <header class="bg-white border-b border-slate-200 px-6 py-4">
    <h1 class="text-xl font-bold text-slate-800">Super Admin <span class="text-slate-400 font-normal text-base">— Turnos Club</span></h1>
  </header>

  <main class="mx-auto max-w-2xl px-4 py-10 space-y-6">

    <!-- Login -->
    <section id="loginCard" class="bg-white rounded-xl border border-slate-200 shadow-sm p-6 space-y-4">
      <h2 class="text-lg font-semibold text-slate-700">Acceso super-admin</h2>
      <div class="flex gap-2">
        <input id="saPassword" type="password" placeholder="Clave maestra"
               class="flex-1 rounded-lg border border-slate-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400" />
        <button id="btnSaLogin"
                class="rounded-lg bg-blue-600 px-4 py-2 text-sm font-semibold text-white hover:bg-blue-700">
          Ingresar
        </button>
      </div>
      <p id="loginMsg" class="text-sm text-red-600 hidden"></p>
    </section>

    <!-- Panel (oculto hasta login) -->
    <div id="saPanel" class="hidden space-y-6">

      <!-- Clubs existentes -->
      <section class="bg-white rounded-xl border border-slate-200 shadow-sm p-6 space-y-4">
        <div class="flex items-center justify-between">
          <h2 class="text-lg font-semibold text-slate-700">Clubs registrados</h2>
          <button id="btnRefreshClubs"
                  class="text-xs text-blue-600 hover:underline">Actualizar</button>
        </div>
        <div id="clubsList" class="space-y-2 text-sm text-slate-500">Cargando...</div>
      </section>

      <!-- Crear club nuevo -->
      <section class="bg-white rounded-xl border border-slate-200 shadow-sm p-6 space-y-4">
        <h2 class="text-lg font-semibold text-slate-700">Agregar club nuevo</h2>

        <div class="space-y-3">
          <div>
            <label class="block text-xs font-semibold text-slate-500 mb-1">Nombre del club</label>
            <input id="cfgNombre" type="text" placeholder="Ej: Club CMR Fútbol"
                   class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400" />
          </div>
          <div>
            <label class="block text-xs font-semibold text-slate-500 mb-1">
              Slug <span class="font-normal text-slate-400">(se usa en la URL: /slug)</span>
            </label>
            <input id="cfgSlug" type="text" placeholder="Ej: cmr-futbol"
                   class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm font-mono focus:outline-none focus:ring-2 focus:ring-blue-400" />
          </div>
          <div>
            <label class="block text-xs font-semibold text-slate-500 mb-1">Clave admin del club</label>
            <input id="cfgPassword" type="text" placeholder="Clave que usará el admin del club"
                   class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400" />
          </div>
        </div>

        <button id="btnCrearClub"
                class="rounded-lg bg-emerald-600 px-4 py-2 text-sm font-semibold text-white hover:bg-emerald-700">
          Crear club
        </button>
        <p id="createMsg" class="text-sm hidden"></p>
      </section>

    </div>
  </main>

  <script src="/superadmin.js"></script>
</body>
</html>
