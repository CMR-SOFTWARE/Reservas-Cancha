<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Turnos Club</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-gradient-to-br from-slate-100 to-slate-200">

  <header class="bg-white border-b border-slate-200 shadow-sm px-6 py-4">
    <div class="mx-auto max-w-4xl flex items-center gap-3">
      <!-- App logo -->
      <svg width="44" height="44" viewBox="0 0 44 44" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect width="44" height="44" rx="10" fill="#15803d"/>
        <rect x="7" y="13" width="30" height="20" rx="2" stroke="white" stroke-width="2" fill="none"/>
        <line x1="22" y1="13" x2="22" y2="33" stroke="white" stroke-width="2"/>
        <circle cx="22" cy="23" r="4.5" stroke="white" stroke-width="2" fill="none"/>
        <rect x="7" y="18" width="4" height="10" rx="1" stroke="white" stroke-width="1.5" fill="none"/>
        <rect x="33" y="18" width="4" height="10" rx="1" stroke="white" stroke-width="1.5" fill="none"/>
      </svg>
      <div>
        <h1 class="text-2xl font-bold text-slate-800 leading-tight">Turnos Club</h1>
        <p class="text-xs text-slate-500 leading-tight">Reserva tu cancha en pocos pasos</p>
      </div>
    </div>
  </header>

  <main class="mx-auto max-w-4xl px-4 py-10">

    <div id="loading" class="text-center text-slate-400 py-20">
      <div class="inline-block w-6 h-6 border-2 border-slate-300 border-t-green-600 rounded-full animate-spin mb-3"></div>
      <p class="text-sm">Cargando clubs...</p>
    </div>

    <div id="emptyState" class="hidden text-center py-20">
      <svg class="mx-auto mb-4 text-slate-300" width="48" height="48" viewBox="0 0 44 44" fill="none">
        <rect x="7" y="13" width="30" height="20" rx="2" stroke="currentColor" stroke-width="2"/>
        <line x1="22" y1="13" x2="22" y2="33" stroke="currentColor" stroke-width="2"/>
        <circle cx="22" cy="23" r="4.5" stroke="currentColor" stroke-width="2"/>
      </svg>
      <p class="text-slate-500 font-medium">No hay clubs disponibles aún.</p>
    </div>

    <div id="clubsGrid" class="hidden grid gap-5 sm:grid-cols-2 lg:grid-cols-3"></div>

  </main>

  <script src="/home.js"></script>
</body>
</html>
